<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid {
            width: 600px;
            height: 600px;
            border: 5px solid #ccc;
            display: grid;
            grid-template: repeat(4, 100px)/repeat(5,100px); /*先寫row, 再寫column*/
            gap: 10px;
            place-content: center;
            /* grid-auto-flow: column; */
        }
        .item{
            background-color: #fa0;
            font-size: 50px;
        }
        .item:nth-child(3){
            background-color: rgb(14, 156, 212);
            color:#fff;
            /* grid-row: 1/3; */
            /* grid-column: span 2  / -1; */
            /* grid-column-end: span 4; */
            /* grid-area:1/4/3/6; */
            grid-area:1/4/span 2/span 2; /*語意同上*/
            
        }
        .item:nth-child(2){
            background-color: #f6a;
            /* grid-area: span 2 / span 2 / 4 / 5; */
            grid-area: span 2 / span 2 / -2 / -2; /*語意同上*/
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>

    </div>
</body>
</html>
