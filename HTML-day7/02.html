<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .list{
            width: 960px;
            display: grid;
            grid-template: repeat(2,auto)/ repeat(4,1fr);
            gap: 20px;            
        }
        .card{
            border: 1px solid red;
            display: flex;
            flex-direction: column;
        }
        .card img{
            width: 100%;
            border-radius: 6px;
            vertical-align: top;
        }
        .card .txt{
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card:first-child{
            grid-area: 1 / 1/ span 2/span 2;
        }
        .card p{
            display: none;
        }
        .card time{
            margin-top: auto;
        }
        .card.active{
            grid-area: 1/1/span 2/ span 2;
        }
        .card.active p{
            display: block;
        }
        .card.active .txt{
            display: grid;
            grid-template: repeat(2,auto)/repeat(2,1fr);
            gap: 20px;
        }
        .card.active .txt h3{
            grid-row: 1 / span 2;
        }

    </style>
</head>
<body>
    
    <div class="list">
        <div class="card active">
            <div class="pic">

            </div>
