<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex{
            width: 600px;
            height: 600px;
            border: 2px solid red;
            display: flex;
            flex-wrap: wrap;
            flex-direction: row;
            /* justify-content: flex-end; */
            /* align-content: flex-start; */
            
        }
        .box{
            width: 150px;
            height: 100px;
            background-color: #fa0;
            font-size: 32px;
            margin: 2px;
        }
        .box:first-child {
            height:100px;
        }
        .box:nth-child(2),
        .box:nth-child(3){
            order:-1;
        }
    </style>
</head>
<body>
    <div class="flex">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>
</html>
