<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .toggle {
            display: block;
            width: 60px;
            height: 30px;
            border: 1px solid #ccc;
            background-color: #eee;
            border-radius: 200px;
            place-content: center;
            box-shadow: 1px 1px 3px #0005 inset;

        }
        .toggle input {
            position: absolute;
        }
        .toggle span {
            display: block;
            height: 26px;
            width: 26px;
            background-color: #fff;
            border-radius: 50%;
            margin-left: 2px;
            box-shadow: 1px 1px 3px #0005;
        }
        .toggle input {
            display: none;
        }
        .toggle input:checked ~ span {
            margin-left: auto;
            margin-right: 2px;
        }
        .toggle:has(:checked) {
            background-color: #fa0;
        }
    </style>
</head>
<body>
    

    <label class="toggle">
        <input type="checkbox" name="" id="">
        <span></span>
    </label>

</body>
</html>
