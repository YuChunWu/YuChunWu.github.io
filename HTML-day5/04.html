<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{

            height: 600px;
            border: 2px solid red;           
            display: flex;
        }
        .item{
            margin: 2px;
            background-color: #fa0;
        }
        .item:nth-child(1),
        .item:nth-child(3){
            width: 100px;
            flex-shrink: 0;
        }
        .item:nth-child(2){
            width: 100%;
            flex-shrink: 1;
        }


    </style>
</head>
<body>
    <div class="wrap">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <!-- <div class="item">4</div>
        <div class="item">5</div> -->
    </div>
</body>
</html>
