<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            width: 600px;
            height: 600px;
            border: 2px solid red;
            display: flex;
            flex-wrap: wrap;            
        }
        .item{
            width: 0px;
            height: 150px;
            margin: 2px;
            background-color: #fa0;
            font-size: 32px;
            flex-grow: 1;
        }
        .item:nth-child(2) {
            flex-grow: 5;
        }
        .item:nth-child(4) {
            flex-grow: 5;
        }
        /* .item:nth-child(2) {
            flex-grow: 1;
        } */

    </style>
</head>
<body>
    <div class="wrap">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
</body>
</html>
