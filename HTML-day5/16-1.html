<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            display: flex;
            flex-wrap: wrap;
        }
        .wrap:has(.card:hover) .card:not(:hover){
            opacity: .6;
        }
        .card{
            width: 200px;
            border: 4px solid #000a;
            position: relative;
            margin: 2px;
        }
        .card img{
            width: 100%;
            vertical-align: top;
        }
        .card .txt{
            background-color: #000a;
            color: #fff;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
        }

        .card:hover .txt{
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="pic">
                <img src="https://picsum.photos/300/200/?random=10">
            </div>
            <div class="txt">
                
            </div>
        </div>

            </div>

        </div>
    </div>
</body>
</html>
