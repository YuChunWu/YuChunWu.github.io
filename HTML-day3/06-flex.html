<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .card{
            width: 400px;
            border: 1px solid red;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            flex-direction: row;
            gap: 20px;
        }
        .card img{
            width: 100%;
        }
        .card .pic{
            width:190px;
        }
        .card .txt{
            width: 190px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="pic">
            <img src="https://picsum.photos/300/200/?random=1">
        </div>
        <div class="txt">
            <h3>title</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Est, corporis!</p>
        </div>
    </div>
    
</body>
</html>
