<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>

        /* Container styles */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1em;
        }

/* Media object styles */
        .media {
            display: flex;
            align-items: flex-start;
        }

        .media-image {
            flex: 0 0 auto;
            width: 150px;
            height: 150px;
            margin-right: 1em;
        }

        .media-body {
            flex: 1 1 auto;
        }

        .media-title {
            font-size: 1.5em;
            margin: 0 0 0.5em;
        }

        .media-description {
            margin: 0;
        }

    </style>
</head>
<body>
    
    <div class="container">
        <div class="media">
          <img src="image.jpg" alt="Image" class="media-image">
          <div class="media-body">
            <h3 class="media-title">Media Title</h3>
            <p class="media-description">Description goes here.</p>
            <i class="fa-solid fa-bolt" style="color:#ffff00"></i>
